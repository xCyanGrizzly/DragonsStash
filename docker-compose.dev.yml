services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dragons
      POSTGRES_PASSWORD: stash
      POSTGRES_DB: dragonsstash
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragons -d dragonsstash"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
