---
kind: pipeline
type: docker
name: build-and-deploy

trigger:
  branch: [main]
  event: [push]

steps:
  # Build the Docker image and push to Gitea's built-in registry
  - name: build
    image: plugins/docker
    settings:
      repo: git.samagsteribbe.nl/admin/dragonsstash
      registry: git.samagsteribbe.nl
      tags:
        - latest
        - "${DRONE_COMMIT_SHA:0:8}"
      username:
        from_secret: gitea_username
      password:
        from_secret: gitea_password

  # SSH into your server and redeploy
  - name: deploy                                                              
      image: appleboy/drone-ssh                                                 
      environment:                                                              
        PLUGIN_HOST: 192.168.68.68                                              
        PLUGIN_USERNAME: sam                                                    
        PLUGIN_PORT: 22                                     
        PLUGIN_KEY:                                                             
          from_secret: ssh_key                              
        PLUGIN_SCRIPT: |
          cd /opt/stacks/DragonsStash                                           
          docker compose pull                                                   
          docker compose up -d
